            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="tmjconnect-export-<id>-<date>.json"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      meta:
                        type: object
