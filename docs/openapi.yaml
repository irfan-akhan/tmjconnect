openapi: 3.1.0
info:
  title: TMJConnect API
  version: 1.0.0
  description: |
    HIPAA-compliant orofacial pain management platform API.
    Supports patients, providers, and admin roles.
  contact:
    name: TMJConnect Engineering
servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Auth
    description: Registration, login, MFA, password reset, token management
  - name: Patients
    description: Patient profile, sessions, notification preferences
  - name: Symptoms
    description: Symptom log CRUD, calendar view
  - name: Exercises
    description: Patient exercise assignments and completions
  - name: Notifications
    description: In-app notification list, mark read
  - name: Reminders
    description: Scheduled push reminder CRUD
  - name: Providers
    description: Provider profile, patient dashboard, exercise library, assignments
  - name: Reports
    description: Patient report submission, provider inbox, responses
  - name: Linking
    description: Patient-provider linking codes, acceptance, disconnection
  - name: Uploads
    description: File uploads (video, avatar, report photos)
  - name: Tracking
    description: Jaw mobility, medication, and sleep quality tracking
  - name: Insights
    description: Pain trend analytics, exercise/medication/sleep correlations
  - name: Intake Forms
    description: Provider-built questionnaires assigned to patients
  - name: Clinic Visits
    description: Provider-recorded in-clinic encounters
  - name: Admin
    description: User management, audit logs, broadcasts, feature flags, scheduled reports, jobs, system metrics
  - name: Support
    description: Patient/provider support ticket submission and history

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    # ─── Common Pagination & Filter Params ──────────────────────────────────────
    limitParam:
      name: limit
      in: query
      description: >
        Maximum number of items to return. Use with `offset` for offset-based
        pagination. Most list endpoints default to 10 and cap at 100.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
        example: 25

    offsetParam:
      name: offset
      in: query
      description: >
        Zero-based number of matching items to skip. For the first page use
        `offset=0`; for the next page use the previous `offset + limit`.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 50

    sortOrderParam:
      name: sortOrder
      in: query
      description: >
        Sort direction for the endpoint's `sortBy` field. If omitted, list
        endpoints default to descending order.
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
        example: desc

    searchParam:
      name: search
      in: query
      description: Generic search term to filter results (case-insensitive)
      required: false
      schema:
        type: string
        maxLength: 255
        example: smith

  schemas:
    # ─── Error ──────────────────────────────────────────────────────────────────
    Error:
      description: Standard error response envelope
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    ErrorBody:
      description: Error detail object
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message
          example: Invalid request body
        details:
          type: array
          description: Per-field validation errors (present on VALIDATION_ERROR)
          items:
            $ref: '#/components/schemas/ValidationDetail'

    ValidationDetail:
      description: Single field validation error
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: JSON path of the invalid field
          example: email
        message:
          type: string
          description: Reason the field is invalid
          example: Invalid email

    # ─── Auth ──────────────────────────────────────────────────────────────────
    TokenPair:
      description: JWT access token (15min) and refresh token (7 days)
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
          description: Short-lived JWT for API access (15min TTL)
        refresh_token:
          type: string
          description: Long-lived token for obtaining new access tokens (7 day TTL)

    MfaRequired:
      description: Returned when login requires MFA verification
      type: object
      required: [mfa_required, mfa_token]
      properties:
        mfa_required:
          type: boolean
          enum: [true]
        mfa_token:
          type: string
          description: Temporary token for MFA verification (5min TTL). Pass to /auth/mfa/verify.

    MfaSetupRequired:
      description: Returned when provider verifies email but has not set up MFA yet
      type: object
      required: [mfa_setup_required, setup_token]
      properties:
        mfa_setup_required:
          type: boolean
          enum: [true]
        setup_token:
          type: string
          description: Temporary token for MFA setup (10min TTL). Pass to /auth/mfa/setup.

    MfaSetupResult:
      description: Returned after successful MFA setup
      type: object
      required: [message, backup_codes, access_token, refresh_token]
      properties:
        message:
          type: string
          example: MFA setup complete. Save these backup codes — they will not be shown again.
        backup_codes:
          type: array
          description: 10 one-time backup codes. Will not be shown again.
          items:
            type: string
          minItems: 10
          maxItems: 10
        access_token:
          type: string
          description: JWT access token (provider is logged in immediately)
        refresh_token:
          type: string
          description: Refresh token

    MfaSetupInit:
      description: TOTP setup data for authenticator app
      type: object
      required: [secret, qr_uri]
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret (for manual entry)
        qr_uri:
          type: string
          description: otpauth:// URI for QR code scanning

    # ─── Users & Profiles ──────────────────────────────────────────────────────
    PatientProfile:
      description: Patient user profile with demographic information
      type: object
      required: [id, email, role, is_active, created_at, updated_at, first_name, last_name, timezone]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        phone: { type: [string, "null"] }
        role: { type: string, enum: [patient] }
        is_active: { type: boolean }
        email_verified: { type: boolean, description: "Whether the patient has verified their email address" }
        mfa_enabled: { type: boolean, description: "Whether patient has opted into MFA" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        tos_accepted_at: { type: [string, "null"], format: date-time }
        tos_version: { type: [string, "null"], description: "Terms of service version accepted by this user" }
        first_name: { type: string }
        last_name: { type: string }
        date_of_birth: { type: [string, "null"], format: date }
        gender: { type: [string, "null"] }
        avatar_url: { type: [string, "null"], format: uri }
        city: { type: [string, "null"] }
        state: { type: [string, "null"] }
        timezone: { type: string, description: "IANA timezone (e.g. America/New_York)" }
        profile_updated_at: { type: [string, "null"], format: date-time }

    ProviderProfile:
      description: Provider user profile with professional details
      type: object
      required: [id, email, role, is_active, email_verified, mfa_enabled, first_name, last_name, timezone, license_number, license_type, specialty, clinic_name]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        phone: { type: [string, "null"] }
        role: { type: string, enum: [provider] }
        is_active: { type: boolean }
        email_verified: { type: boolean }
        mfa_enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        tos_accepted_at: { type: [string, "null"], format: date-time }
        tos_version: { type: [string, "null"] }
        first_name: { type: string }
        last_name: { type: string }
        gender: { type: [string, "null"] }
        avatar_url: { type: [string, "null"], format: uri }
        city: { type: [string, "null"] }
        state: { type: [string, "null"] }
        timezone: { type: string, description: "IANA timezone" }
        license_number: { type: string }
        license_type: { type: string }
        specialty: { type: string }
        clinic_name: { type: string }
        credentials:
          description: Professional titles (e.g. ['DDS', 'CCMC'])
          oneOf:
            - type: array
              items: { type: string, maxLength: 100 }
              maxItems: 20
            - type: "null"
        profile_updated_at: { type: [string, "null"], format: date-time }

    NotificationPreferences:
      description: Per-user notification channel and frequency preferences
      type: object
      required: [user_id, exercise_reminders, symptom_checkin, provider_messages, report_updates, tips_updates, email_digest]
      properties:
        user_id: { type: string, format: uuid }
        exercise_reminders: { type: boolean, description: "Push/email for exercise reminders" }
        symptom_checkin: { type: boolean, description: "Push for symptom check-in reminders" }
        provider_messages: { type: boolean, description: "Push/email for provider messages" }
        report_updates: { type: boolean, description: "Push/email for report status changes" }
        tips_updates: { type: boolean, description: "Push for tips and wellness updates" }
        email_digest:
          type: string
          enum: [instant, daily, weekly, off]
          description: "Email delivery frequency"

    Session:
      description: Active login session
      type: object
      required: [id, user_id, device_info, last_active, expires_at, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, description: "Owner of this session" }
        device_info: { type: string, description: "User-Agent string (truncated to 500 chars)" }
        ip_address: { type: [string, "null"], description: "Client IP address" }
        last_active: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, description: "When the session expires" }
        created_at: { type: string, format: date-time }

    # ─── Symptoms ──────────────────────────────────────────────────────────────
    BodyArea:
      description: Affected body area with optional side
      type: object
      required: [area]
      properties:
        area:
          type: string
          description: "Body region (e.g. jaw, temple, neck, ear)"
          example: jaw
        side:
          type: [string, "null"]
          description: "Laterality if applicable"
          enum: [left, right, both, null]
          example: left

    SymptomLog:
      description: Daily patient symptom entry (one per calendar day)
      type: object
      required: [id, patient_id, pain_level, pain_types, body_areas, triggers, logged_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        pain_level:
          type: integer
          minimum: 0
          maximum: 10
          description: "Self-reported pain scale"
        pain_types:
          type: array
          description: "Types of pain experienced (e.g. aching, sharp, throbbing)"
          items: { type: string }
        body_areas:
          type: array
          description: "Affected body areas"
          items:
            $ref: '#/components/schemas/BodyArea'
        duration_minutes:
          type: [integer, "null"]
          description: "Duration of symptoms in minutes"
        triggers:
          type: array
          description: "What triggered or worsened symptoms (e.g. chewing, stress, cold)"
          items: { type: string }
        notes:
          type: [string, "null"]
          description: "Free-text patient notes (DOMPurify sanitised)"
        logged_at: { type: string, format: date-time, description: "When symptoms occurred (client-provided)" }
        created_at: { type: string, format: date-time, description: "Server-set creation time (immutable)" }
        updated_at: { type: string, format: date-time, description: "Last edit time (24h edit window)" }

    CalendarDay:
      description: Single symptom log entry for a calendar day (includes id + full details)
      type: object
      required: [day, count, id, patient_id, pain_level, pain_types, body_areas, triggers, logged_at, created_at, updated_at]
      properties:
        day: { type: string, format: date, description: "Calendar date (YYYY-MM-DD)" }
        count: { type: integer, enum: [1], description: "Always 1 (enforced one log per UTC day)" }
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        pain_level:
          type: integer
          minimum: 0
          maximum: 10
          description: "Self-reported pain scale"
        pain_types:
          type: array
          items: { type: string }
        body_areas:
          type: array
          items:
            $ref: '#/components/schemas/BodyArea'
        duration_minutes:
          type: [integer, "null"]
          description: "Duration of symptoms in minutes"
        triggers:
          type: array
          items: { type: string }
        notes:
          type: [string, "null"]
          description: "Free-text patient notes (DOMPurify sanitised)"
        logged_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ─── Exercises ─────────────────────────────────────────────────────────────
    Exercise:
      description: Exercise in a provider's video library
      type: object
      required: [id, provider_id, title, created_at]
      properties:
        id: { type: string, format: uuid }
        provider_id: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        description: { type: [string, "null"], description: "Exercise description (sanitised)" }
        duration_seconds: { type: [integer, "null"], description: "Expected duration" }
        category: { type: [string, "null"], description: "Exercise category for filtering" }
        instructions: { type: [string, "null"], description: "Step-by-step instructions (sanitised)" }
        video_url: { type: [string, "null"], format: uri, description: "Uploaded video URL" }
        thumbnail_url: { type: [string, "null"], format: uri, description: "Video thumbnail URL" }
        created_at: { type: string, format: date-time }

    ExerciseAssignment:
      description: Exercise assigned to a patient by their provider
      type: object
      required: [assignment_id, exercise_id, title, frequency, sets, status, assigned_at]
      properties:
        assignment_id: { type: string, format: uuid }
        exercise_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, "null"] }
        duration_seconds: { type: [integer, "null"] }
        category: { type: [string, "null"] }
        instructions: { type: [string, "null"] }
        video_url: { type: [string, "null"], format: uri }
        thumbnail_url: { type: [string, "null"], format: uri }
        frequency: { type: string, description: "e.g. daily, 3x weekly" }
        sets: { type: integer, minimum: 1 }
        status: { type: string, enum: [active, paused, completed] }
        assigned_at: { type: string, format: date-time }

    ExerciseCompletion:
      description: Record of a patient completing an exercise assignment for the day
      type: object
      required: [id, assignment_id, patient_id, completed_at]
      properties:
        id: { type: string, format: uuid }
        assignment_id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        completed_at: { type: string, format: date-time }

    # ─── Notifications & Reminders ─────────────────────────────────────────────
    Notification:
      description: In-app notification record
      type: object
      required: [id, type, title, body, read, data, created_at]
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          description: "Notification type (determines channel routing)"
          enum: [exercise_reminder, symptom_checkin, provider_message, report_submitted, report_urgent, report_reviewed, exercise_assigned, link_accepted, welcome, password_reset, mfa_code, new_device_login, weekly_summary, account_locked, streak_milestone]
        title: { type: string }
        body: { type: string }
        read: { type: boolean }
        read_at: { type: [string, "null"], format: date-time, description: "Timestamp when the notification was marked read" }
        data:
          $ref: '#/components/schemas/NotificationData'
        created_at: { type: string, format: date-time }

    NotificationData:
      description: Extra payload for deep linking and context
      type: object
      properties:
        reportId: { type: string, format: uuid, description: "For report-related notifications" }
        reminderId: { type: string, format: uuid, description: "For reminder notifications" }
        patientId: { type: string, format: uuid, description: "For provider-facing notifications" }
        providerId: { type: string, format: uuid, description: "For patient-facing link notifications" }
        urgency: { type: string, enum: [routine, concerning, urgent], description: "Report urgency level" }
        action: { type: string, description: "Sub-action (e.g. 'responded')" }
      additionalProperties: true

    Reminder:
      description: Scheduled push reminder configured by the user
      type: object
      required: [id, type, time, days, enabled, created_at]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [exercise, symptom] }
        time: { type: string, pattern: "^\\d{2}:\\d{2}$", example: "09:00", description: "Local time (HH:MM)" }
        days:
          type: array
          description: "Days of week to fire"
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        enabled: { type: boolean }
        next_fire_at: { type: [string, "null"], format: date-time, description: "Pre-computed next UTC fire time" }
        created_at: { type: string, format: date-time }

    # ─── Reports ───────────────────────────────────────────────────────────────
    Report:
      description: Patient-to-provider health report
      type: object
      required: [id, patient_id, urgency, description, status, flagged, submitted_at]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        provider_id: { type: [string, "null"], format: uuid, description: "NULL if provider deleted" }
        urgency: { type: string, enum: [routine, concerning, urgent] }
        pain_level: { type: [integer, "null"], minimum: 0, maximum: 10 }
        description: { type: string, description: "Patient's symptom narrative (sanitised)" }
        photo_url: { type: [string, "null"], format: uri }
        period_start: { type: [string, "null"], format: date-time }
        period_end: { type: [string, "null"], format: date-time }
        summary_data:
          $ref: '#/components/schemas/ReportSummaryData'
        patient_notes: { type: [string, "null"], description: "Additional patient notes (sanitised)" }
        status: { type: string, enum: [submitted, viewed, reviewed, responded] }
        flagged: { type: boolean }
        submitted_at: { type: string, format: date-time }
        viewed_at: { type: [string, "null"], format: date-time }
        reviewed_at: { type: [string, "null"], format: date-time }
        authored_by_user_id:
          type: [string, "null"]
          format: uuid
          description: "Who authored the row. Equals patient_id for patient-submitted reports; equals provider_id for on-behalf-of reports."
        authored_by_role:
          type: string
          enum: [patient, provider]
          description: "Provenance flag. 'provider' = filed on-behalf-of via /providers/patients/:id/reports."

    ClinicalNote:
      description: Provider-authored note about a patient. Never returned in patient-facing responses.
      type: object
      required: [id, patient_id, body, tags, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        provider_id: { type: [string, "null"], format: uuid, description: "NULL if provider was deleted" }
        body: { type: string }
        tags:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ReportRequest:
      description: Provider-to-patient nudge asking for a report. Fulfilled when a linked report is filed.
      type: object
      required: [id, patient_id, prompt, status, created_at]
      properties:
        id: { type: string, format: uuid }
        provider_id: { type: [string, "null"], format: uuid }
        patient_id: { type: string, format: uuid }
        prompt: { type: string, maxLength: 2000 }
        status: { type: string, enum: [pending, fulfilled, dismissed] }
        fulfilled_report_id: { type: [string, "null"], format: uuid }
        fulfilled_at: { type: [string, "null"], format: date-time }
        dismissed_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }

    ReportSummaryData:
      description: Auto-generated stats snapshot at time of report submission
      type: object
      properties:
        avg_pain_7d: { type: [number, "null"], description: "7-day average pain level" }
        symptom_count_7d: { type: [integer, "null"], description: "Symptom logs in last 7 days" }
        exercises_completed_7d: { type: [integer, "null"], description: "Exercises completed in last 7 days" }
      additionalProperties: true

    ReportInboxItem:
      description: Summary row in the provider report inbox (description truncated to 200 chars)
      type: object
      required: [id, patient_id, urgency, status, flagged, submitted_at, patient_first_name, patient_last_name]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        urgency: { type: string, enum: [routine, concerning, urgent] }
        status: { type: string, enum: [submitted, viewed, reviewed, responded] }
        pain_level: { type: [integer, "null"] }
        description_preview: { type: string, maxLength: 200, description: "First 200 chars of description" }
        flagged: { type: boolean }
        submitted_at: { type: string, format: date-time }
        patient_first_name: { type: string }
        patient_last_name: { type: string }

    ReportResponse:
      description: Provider text response to a report
      type: object
      required: [id, report_id, provider_id, message, responded_at]
      properties:
        id: { type: string, format: uuid }
        report_id: { type: string, format: uuid }
        provider_id: { type: [string, "null"], format: uuid }
        message: { type: string, description: "Response visible to patient (sanitised)" }
        internal_notes:
          type: [string, "null"]
          description: "Provider-only notes. NEVER returned in patient-facing responses."
        responded_at: { type: string, format: date-time }

    ReportDetail:
      description: Full report with provider responses
      type: object
      required: [report, responses]
      properties:
        report:
          $ref: '#/components/schemas/Report'
        responses:
          type: array
          items:
            $ref: '#/components/schemas/ReportResponse'

    # ─── Linking ───────────────────────────────────────────────────────────────
    LinkingCode:
      description: Provider-generated 6-character patient invite code (7-day expiry)
      type: object
      required: [id, code, provider_id, status, expires_at, created_at]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, minLength: 6, maxLength: 6, description: "6-char alphanumeric code" }
        provider_id: { type: string, format: uuid }
        patient_id: { type: [string, "null"], format: uuid, description: "Set when patient accepts" }
        status: { type: string, enum: [pending, connected, expired] }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    Link:
      description: Active patient-provider connection
      type: object
      required: [link_id, first_name, last_name, linked_at]
      properties:
        link_id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid, description: "Present in provider's view" }
        provider_id: { type: string, format: uuid, description: "Present in patient's view" }
        email: { type: string, format: email, description: "Email address of the other party" }
        first_name: { type: string, description: "Name of the other party" }
        last_name: { type: string }
        avatar_url: { type: [string, "null"], format: uri }
        linked_at: { type: string, format: date-time }
        diagnosis: { type: [string, "null"], description: "Provider's working diagnosis for this patient (set via PATCH /providers/patients/:patientId/link)" }

    # ─── Uploads ───────────────────────────────────────────────────────────────
    UploadResult:
      description: Result of a file upload operation
      type: object
      required: [key, url]
      properties:
        key: { type: string, description: "Storage key (e.g. videos/uuid.mp4)" }
        url: { type: string, format: uri, description: "Public/signed URL to access the file" }

    # ─── Pagination ────────────────────────────────────────────────────────────
    ListMeta:
      description: >
        Metadata returned by offset-paginated list endpoints. `limit` and
        `offset` echo the request. `hasMore` is true when another request at
        `offset + limit` may return more items. `total` is included only on
        endpoints that calculate an exact total. `sortBy` is endpoint-specific
        and appears when a sortable field was requested.
      type: object
      required: [limit, offset, hasMore, sortOrder]
      properties:
        limit:
          type: integer
          description: Maximum number of items requested.
          example: 25
        offset:
          type: integer
          description: Zero-based number of matching items skipped.
          example: 50
        hasMore:
          type: boolean
          description: Whether another page may exist at `offset + limit`.
          example: true
        total:
          type: integer
          description: Exact total matching item count, when available.
          example: 137
        sortBy:
          type: string
          description: Endpoint-specific field used for sorting, when requested.
          example: created_at
        sortOrder:
          type: string
          enum: [asc, desc]
          description: Sort direction applied to `sortBy` or to the endpoint default.
          example: desc
      example:
        limit: 25
        offset: 50
        hasMore: true
        total: 137
        sortBy: created_at
        sortOrder: desc

    PageMeta:
      description: Deprecated compatibility alias for ListMeta. New and updated list endpoints use offset-based metadata, not page/totalPages.
      deprecated: true
      allOf:
        - $ref: '#/components/schemas/ListMeta'

    CursorMeta:
      description: Cursor-based pagination metadata
      type: object
      required: [hasMore]
      properties:
        nextCursor: { type: [string, "null"], description: "Pass as cursor param for next page" }
        hasMore: { type: boolean }

    # ─── Provider Dashboard ────────────────────────────────────────────────────
    PatientDashboardItem:
      description: Patient summary row in provider dashboard with 7-day stats
      type: object
      required: [patient_id, first_name, last_name, linked_at, exercises_completed_7d]
      properties:
        patient_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        avatar_url: { type: [string, "null"], format: uri }
        linked_at: { type: string, format: date-time }
        last_symptom_at: { type: [string, "null"], format: date-time, description: "Most recent symptom log" }
        avg_pain_7d: { type: [number, "null"], description: "7-day average pain level (0.0–10.0)" }
        exercises_completed_7d: { type: integer, description: "Exercises completed in last 7 days" }

    # ─── Admin ─────────────────────────────────────────────────────────────────
    AdminStats:
      description: Admin dashboard statistics
      type: object
      required: [total_users, active_users, patients, providers, reports_today]
      properties:
        total_users: { type: integer }
        active_users: { type: integer }
        patients: { type: integer }
        providers: { type: integer }
        reports_today: { type: integer }
        avg_response_hours: { type: [number, "null"], description: "30-day avg report response time in hours" }

    AdminUserListItem:
      description: User row in admin user list
      type: object
      required: [id, email, role, is_active, email_verified, mfa_enabled, first_name, last_name, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [patient, provider, admin] }
        is_active: { type: boolean }
        email_verified: { type: boolean }
        mfa_enabled: { type: boolean }
        first_name: { type: string }
        last_name: { type: string }
        created_at: { type: string, format: date-time }

    AdminUserDetail:
      description: Full user detail with recent audit logs and login events
      type: object
      required: [user, recent_audit_logs, recent_login_events]
      properties:
        user:
          allOf:
            - $ref: '#/components/schemas/AdminUserListItem'
            - type: object
              properties:
                phone: { type: [string, "null"] }
                date_of_birth: { type: [string, "null"], format: date }
                gender: { type: [string, "null"] }
                city: { type: [string, "null"] }
                state: { type: [string, "null"] }
                timezone: { type: [string, "null"] }
                updated_at: { type: [string, "null"], format: date-time }
                deleted_at: { type: [string, "null"], format: date-time }
        recent_audit_logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        recent_login_events:
          type: array
          items:
            $ref: '#/components/schemas/LoginEvent'

    AuditLog:
      description: HIPAA audit trail entry (append-only, never deleted)
      type: object
      required: [id, action, metadata, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: [string, "null"], format: uuid, description: "NULL after user hard-delete" }
        action: { type: string, description: "e.g. auth.login, report_submitted, admin_user_updated" }
        resource_type: { type: [string, "null"], description: "e.g. user, report, symptom_log" }
        resource_id: { type: [string, "null"], format: uuid }
        ip_address: { type: [string, "null"] }
        user_agent: { type: [string, "null"] }
        metadata:
          type: object
          description: "Contextual data (IDs and aggregates only, never raw PHI)"
          properties:
            requestId: { type: string, format: uuid }
            method: { type: string }
            path: { type: string }
            statusCode: { type: integer }
          additionalProperties: true
        created_at: { type: string, format: date-time }

    LoginEvent:
      description: Login attempt record for security monitoring
      type: object
      required: [id, email, success, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: [string, "null"], format: uuid }
        email: { type: string, format: email }
        success: { type: boolean }
        ip_address: { type: [string, "null"] }
        device_info: { type: [string, "null"] }
        failure_reason:
          type: [string, "null"]
          description: "e.g. invalid_password, account_locked, email_not_verified"
        created_at: { type: string, format: date-time }

    # ─── Insights & Correlation ────────────────────────────────────────────
    PainInsights:
      description: Aggregated pain analytics over a configurable time window
      type: object
      required: [daily_averages, day_of_week, trigger_frequency, pain_type_frequency, overall]
      properties:
        daily_averages:
          type: array
          items:
            type: object
            required: [date, avg_pain, count]
            properties:
              date: { type: string, format: date }
              avg_pain: { type: number }
              count: { type: integer }
        day_of_week:
          type: array
          items:
            type: object
            required: [day, avg_pain, count]
            properties:
              day: { type: integer, minimum: 0, maximum: 6, description: "0=Sun, 6=Sat" }
              avg_pain: { type: number }
              count: { type: integer }
        trigger_frequency:
          type: array
          items:
            type: object
            required: [trigger, count]
            properties:
              trigger: { type: string }
              count: { type: integer }
        pain_type_frequency:
          type: array
          items:
            type: object
            required: [type, count]
            properties:
              type: { type: string }
              count: { type: integer }
        overall:
          type: object
          required: [avg_pain, total_logs, trend]
          properties:
            avg_pain: { type: number, description: "Average pain over the period" }
            total_logs: { type: integer }
            trend: { type: number, description: "Change from prior half-period (negative = improving)" }

    ExerciseCorrelation:
      description: Pain comparison between exercise and rest days
      type: object
      required: [exercise_days_avg_pain, exercise_days_count, no_exercise_days_avg_pain, no_exercise_days_count]
      properties:
        exercise_days_avg_pain: { type: number }
        exercise_days_count: { type: integer }
        no_exercise_days_avg_pain: { type: number }
        no_exercise_days_count: { type: integer }

    SymptomStats:
      description: Lightweight lifetime symptom statistics
      type: object
      required: [first_logged_at, total_count]
      properties:
        first_logged_at: { type: [string, "null"], format: date-time }
        total_count: { type: integer }

    # ─── Dashboard ─────────────────────────────────────────────────────────
    DashboardData:
      description: Consolidated patient dashboard payload (single API call)
      type: object
      required: [profile, today_log, streak, assignments, notifications, unread_count]
      properties:
        profile:
          type: [object, "null"]
          properties:
            first_name: { type: string }
            last_name: { type: string }
            avatar_url: { type: [string, "null"] }
        today_log:
          type: [object, "null"]
          description: "Null if no log today"
          properties:
            id: { type: string, format: uuid }
            pain_level: { type: integer, minimum: 0, maximum: 10 }
            pain_types: { type: array, items: { type: string } }
            logged_at: { type: string, format: date-time }
        streak:
          type: object
          required: [streak, longest]
          properties:
            streak: { type: integer, description: "Current consecutive logging days" }
            longest: { type: integer, description: "All-time longest streak" }
        assignments:
          type: array
          items:
            type: object
            required: [assignment_id, title, status, completed_today]
            properties:
              assignment_id: { type: string, format: uuid }
              title: { type: string }
              category: { type: string }
              duration_seconds: { type: integer }
              frequency: { type: string }
              sets: { type: integer }
              status: { type: string }
              completed_today: { type: boolean }
        notifications:
          type: array
          items: { $ref: '#/components/schemas/Notification' }
        unread_count: { type: integer }

    # ─── Tracking: Jaw Mobility ────────────────────────────────────────────
    MobilityLog:
      description: Jaw mobility measurement entry
      type: object
      required: [id, measurement_mm, method, logged_at, created_at]
      properties:
        id: { type: string, format: uuid }
        measurement_mm: { type: integer, minimum: 1, maximum: 80, description: "Max mouth opening in millimeters" }
        method: { type: string, enum: [fingers, ruler, caliper], description: "Measurement method" }
        notes: { type: [string, "null"] }
        logged_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    MobilityTrendPoint:
      description: Daily aggregated mobility measurement
      type: object
      required: [date, avg_mm, count]
      properties:
        date: { type: string, format: date }
        avg_mm: { type: integer }
        count: { type: integer }

    # ─── Tracking: Medications ─────────────────────────────────────────────
    MedicationLog:
      description: Single medication dose record
      type: object
      required: [id, medication_name, logged_at, created_at]
      properties:
        id: { type: string, format: uuid }
        medication_name: { type: string, maxLength: 120 }
        dosage: { type: [string, "null"], maxLength: 60 }
        notes: { type: [string, "null"] }
        logged_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    MedicationCorrelation:
      description: Pain comparison between medication and non-medication days
      type: object
      required: [medication_days_avg_pain, medication_days_count, no_medication_days_avg_pain, no_medication_days_count]
      properties:
        medication_days_avg_pain: { type: number }
        medication_days_count: { type: integer }
        no_medication_days_avg_pain: { type: number }
        no_medication_days_count: { type: integer }

    # ─── Tracking: Sleep ───────────────────────────────────────────────────
    SleepLog:
      description: Morning sleep quality check-in
      type: object
      required: [id, quality, bruxism_aware, logged_at, created_at]
      properties:
        id: { type: string, format: uuid }
        quality: { type: integer, minimum: 1, maximum: 5, description: "1=terrible, 5=great" }
        hours_slept: { type: [number, "null"], description: "Hours slept (e.g. 7.5)" }
        bruxism_aware: { type: boolean, description: "Did user notice teeth grinding/clenching?" }
        morning_stiffness: { type: [integer, "null"], minimum: 0, maximum: 10, description: "Morning jaw stiffness level" }
        notes: { type: [string, "null"] }
        logged_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    SleepCorrelationBucket:
      description: Sleep quality vs pain correlation bucket
      type: object
      required: [quality, avg_pain, days]
      properties:
        quality: { type: string, enum: [good, fair, poor] }
        avg_pain: { type: number }
        days: { type: integer }

    # ─── Activity ──────────────────────────────────────────────────────────
    ActivityEvent:
      description: Account activity log entry
      type: object
      required: [id, action, created_at]
      properties:
        id: { type: string, format: uuid }
        action: { type: string, description: "e.g. auth.login, profile_updated, password_changed" }
        resource_type: { type: [string, "null"] }
        ip_address: { type: [string, "null"] }
        user_agent: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    # ─── Auth (additions: ToS, email change) ───────────────────────────────────
    TosCurrent:
      description: Current Terms of Service version + the user's acceptance state
      type: object
      required: [current_version, published_at, accepted]
      properties:
        current_version: { type: string, example: "2026-01" }
        published_at: { type: string, format: date-time }
        accepted: { type: boolean }
        accepted_version: { type: [string, "null"] }
        accepted_at: { type: [string, "null"], format: date-time }

    EmailChangeRequestResult:
      description: Acknowledgement that a verification code was emailed to the new address
      type: object
      required: [ok, expires_at]
      properties:
        ok: { type: boolean, enum: [true] }
        expires_at: { type: string, format: date-time, description: "When the verification code stops being valid" }

    # ─── Clinic Visits ─────────────────────────────────────────────────────────
    ClinicVisit:
      description: Provider-recorded in-clinic encounter with a linked patient
      type: object
      required: [id, patient_id, visited_at, created_at]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        provider_id: { type: [string, "null"], format: uuid, description: "null if the recording provider was later deleted" }
        visited_at: { type: string, format: date-time }
        notes: { type: [string, "null"], maxLength: 2000 }
        created_at: { type: string, format: date-time }

    # ─── Intake Forms ──────────────────────────────────────────────────────────
    IntakeFieldDef:
      description: Definition of a single field in an intake form
      type: object
      required: [type, label, required, order]
      properties:
        type: { type: string, enum: [scale, checkbox, text, select, number] }
        label: { type: string }
        options: { type: array, items: { type: string }, description: "Required for select / checkbox" }
        required: { type: boolean }
        order: { type: integer, description: "Display order — lower first" }
        min: { type: integer, description: "For scale / number fields" }
        max: { type: integer, description: "For scale / number fields" }
        placeholder: { type: string }

    IntakeForm:
      description: A provider-built questionnaire template
      type: object
      required: [id, provider_id, title, fields, status, created_at]
      properties:
        id: { type: string, format: uuid }
        provider_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, "null"] }
        fields:
          type: array
          items: { $ref: '#/components/schemas/IntakeFieldDef' }
        status: { type: string, enum: [draft, published, archived] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    IntakeFormAssignment:
      description: An instance of an intake form assigned to a specific patient
      type: object
      required: [id, form_id, patient_id, provider_id, status, assigned_at]
      properties:
        id: { type: string, format: uuid }
        form_id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        provider_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, completed] }
        assigned_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }

    IntakeAssignmentForPatient:
      description: Pending intake assignment as the patient sees it (form fields embedded)
      type: object
      required: [id, form_id, status, assigned_at, form_title, form_fields]
      properties:
        id: { type: string, format: uuid }
        form_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, completed] }
        assigned_at: { type: string, format: date-time }
        form_title: { type: string }
        form_description: { type: [string, "null"] }
        form_fields:
          type: array
          items: { $ref: '#/components/schemas/IntakeFieldDef' }
        provider_name: { type: string }

    IntakeResponse:
      description: A patient's submission to an intake form
      type: object
      required: [id, assignment_id, form_id, patient_id, answers, submitted_at]
      properties:
        id: { type: string, format: uuid }
        assignment_id: { type: string, format: uuid }
        form_id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        answers:
          type: array
          description: "Array of answer objects shaped by the field's type"
          items: { type: object, additionalProperties: true }
        submitted_at: { type: string, format: date-time }

    IntakeResponseRow:
      description: Per-response row used by the provider's responses-list view (joined with patient name)
      type: object
      required: [id, patient_id, answers, submitted_at, patient_name]
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        answers:
          type: array
          items: { type: object, additionalProperties: true }
        submitted_at: { type: string, format: date-time }
        patient_name: { type: string }

    # ─── Analytics ─────────────────────────────────────────────────────────────
    PatientAnalytics:
      description: Per-patient analytics aggregations over a configurable window
      type: object
      required: [pain_trend, pain_summary, trigger_frequency, exercise_compliance, body_area_frequency, day_of_week]
      properties:
        pain_trend:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              pain_level: { type: number }
        pain_summary:
          type: object
          properties:
            avg_pain: { type: number }
            min_pain: { type: number }
            max_pain: { type: number }
            total_logs: { type: integer }
        trigger_frequency:
          type: array
          items:
            type: object
            properties:
              trigger: { type: string }
              count: { type: integer }
        exercise_compliance:
          type: object
          properties:
            completed: { type: integer }
            assigned: { type: integer }
            rate: { type: number, description: "Percent (0–100)" }
        body_area_frequency:
          type: array
          items:
            type: object
            properties:
              area: { type: string }
              count: { type: integer }
        day_of_week:
          type: array
          items:
            type: object
            properties:
              day: { type: string, description: "Day name e.g. Monday" }
              avg_pain: { type: number }

    ProviderAnalytics:
      description: Provider-wide analytics across all linked patients
      type: object
      required: [overview, pain_trend, trigger_distribution, patient_engagement, pain_distribution, exercise_impact, day_of_week_pattern]
      properties:
        overview:
          type: object
          properties:
            total_patients: { type: integer }
            active_patients_7d: { type: integer }
            avg_pain_level: { type: number }
            avg_pain_trend: { type: number, description: "Delta vs prior period" }
            total_logs_30d: { type: integer }
            exercise_compliance_pct: { type: number }
        pain_trend:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              avg_pain: { type: number }
              log_count: { type: integer }
        trigger_distribution:
          type: array
          items:
            type: object
            properties:
              trigger: { type: string }
              count: { type: integer }
              pct: { type: number }
        patient_engagement:
          type: array
          items:
            type: object
            properties:
              patient_id: { type: string, format: uuid }
              first_name: { type: string }
              last_name: { type: string }
              logs_30d: { type: integer }
              avg_pain: { type: number }
              pain_delta: { type: number }
              last_log_at: { type: [string, "null"], format: date-time }
              exercises_completed_30d: { type: integer }
        pain_distribution:
          type: array
          items:
            type: object
            properties:
              level: { type: integer }
              count: { type: integer }
        exercise_impact:
          type: object
          properties:
            with_exercise_avg_pain: { type: number }
            without_exercise_avg_pain: { type: number }
            with_exercise_days: { type: integer }
            without_exercise_days: { type: integer }
        day_of_week_pattern:
          type: array
          items:
            type: object
            properties:
              day: { type: string }
              avg_pain: { type: number }
              log_count: { type: integer }

    PlatformAnalytics:
      description: Cross-platform analytics for the admin overview
      type: object
      properties:
        user_growth:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              patients: { type: integer }
              providers: { type: integer }
        pain_overview:
          type: object
          properties:
            avg_pain: { type: number }
            total_logs: { type: integer }
            active_loggers: { type: integer }
        pain_trend:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              avg_pain: { type: number }
              log_count: { type: integer }
        pain_distribution:
          type: array
          items:
            type: object
            properties:
              level: { type: integer }
              count: { type: integer }
        top_triggers:
          type: array
          items:
            type: object
            properties:
              trigger: { type: string }
              count: { type: integer }
              pct: { type: number }
        report_volume:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              total: { type: integer }
              urgent: { type: integer }
              concerning: { type: integer }
              routine: { type: integer }
        response_times:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              avg_hours: { type: number }
        exercise_stats:
          type: object
          properties:
            total_exercises: { type: integer }
            total_assignments: { type: integer }
            completion_rate: { type: number }
        engagement_funnel:
          type: object
          properties:
            total_users: { type: integer }
            verified: { type: integer }
            with_profile: { type: integer }
            active_7d: { type: integer }
            active_30d: { type: integer }
        provider_workload:
          type: array
          items:
            type: object
            properties:
              provider_id: { type: string, format: uuid }
              name: { type: string }
              patient_count: { type: integer }
              reports_30d: { type: integer }
              avg_response_hours: { type: [number, "null"] }

    # ─── Admin entities ────────────────────────────────────────────────────────
    OutboxItem:
      description: One queued notification awaiting delivery (or in DLQ)
      type: object
      required: [id, user_id, channel, template, attempts, max_attempts, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        channel: { type: string, enum: [email, sms, push] }
        template: { type: string }
        payload: { type: object, additionalProperties: true, description: "Template payload data (DB column: payload)" }
        attempts: { type: integer }
        max_attempts: { type: integer }
        next_attempt_at: { type: [string, "null"], format: date-time, description: "Scheduled next retry time" }
        sent_at: { type: [string, "null"], format: date-time }
        last_error: { type: [string, "null"], description: "Last delivery failure reason (DB column: last_error)" }
        created_at: { type: string, format: date-time }

    JobSummary:
      description: Most recent run + recent success rate for a scheduled job
      type: object
      properties:
        name: { type: string, example: reminderJob }
        last_run_at: { type: [string, "null"], format: date-time }
        last_status: { type: [string, "null"], enum: [started, success, failed, null] }
        success_rate_24h: { type: number, description: "Percent (0–100) of runs succeeded in last 24h" }

    JobRun:
      description: A single recorded execution of a scheduled job
      type: object
      required: [id, job_name, status, started_at]
      properties:
        id: { type: string, format: uuid }
        job_name: { type: string }
        status: { type: string, enum: [started, success, failed] }
        started_at: { type: string, format: date-time }
        finished_at: { type: [string, "null"], format: date-time, description: "Renamed from ended_at — maps to finished_at in DB" }
        error_message: { type: [string, "null"] }
        duration_ms: { type: [integer, "null"], description: "Execution time in milliseconds" }
        rows_affected: { type: [integer, "null"], description: "Rows processed/modified by the job" }
        metadata: { type: [object, "null"], additionalProperties: true, description: "Job-specific context" }

    Broadcast:
      description: Admin-sent notification fan-out to a defined audience
      type: object
      required: [id, audience, type, title, body, channels, recipient_count, created_at, created_by_email]
      properties:
        id: { type: string, format: uuid }
        audience: { type: string, description: "e.g. all_patients, all_providers, role:admin" }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        channels:
          type: array
          items: { type: string, enum: [email, sms, push, in_app] }
        recipient_count: { type: integer }
        scheduled_at: { type: [string, "null"], format: date-time }
        sent_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        created_by_email: { type: string, format: email }

    FeatureFlag:
      description: Server-side feature flag controlled by admins
      type: object
      required: [key, enabled, rollout_percent, target_roles, updated_by, updated_at, created_at]
      properties:
        key: { type: string }
        enabled: { type: boolean }
        description: { type: [string, "null"], description: "Human-readable description of this flag (nullable)" }
        rollout_percent: { type: integer, minimum: 0, maximum: 100 }
        target_roles:
          type: array
          items: { type: string, enum: [patient, provider, admin] }
        updated_by: { type: string, format: uuid }
        updated_by_email: { type: string, format: email }
        updated_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    ScheduledReport:
      description: A periodic CSV/email report generated for admins
      type: object
      required: [id, name, entity, filters, cadence, recipient_emails, next_run_at, enabled, created_at, created_by_email]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        entity: { type: string, description: "e.g. audit_logs, login_events, reports" }
        filters:
          type: object
          additionalProperties: true
        cadence: { type: string, enum: [daily, weekly, monthly] }
        recipient_emails:
          type: array
          items: { type: string, format: email }
        next_run_at: { type: string, format: date-time }
        last_run_at: { type: [string, "null"], format: date-time }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        created_by_email: { type: string, format: email }

    LinkingCodeRow:
      description: Linking code with the issuing provider's name (admin view)
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        provider_id: { type: string, format: uuid }
        provider_name: { type: string }
        status: { type: string, enum: [pending, connected, expired] }
        invited_email: { type: [string, "null"], format: email }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        accepted_at: { type: [string, "null"], format: date-time }

    LinkingLinkRow:
      description: Patient–provider link with both names (admin view)
      type: object
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        patient_name: { type: string }
        provider_id: { type: string, format: uuid }
        provider_name: { type: string }
        linked_at: { type: string, format: date-time }
        unlinked_at: { type: [string, "null"], format: date-time }

    ProviderPerformanceRow:
      description: Per-provider performance roll-up
      type: object
      properties:
        provider_id: { type: string, format: uuid }
        name: { type: string }
        patient_count: { type: integer }
        active_patients_7d: { type: integer }
        reports_30d: { type: integer }
        avg_response_hours: { type: [number, "null"] }
        unanswered_over_24h: { type: integer }
        notes_30d: { type: integer }

    PatientEngagementRow:
      description: Per-patient engagement classification
      type: object
      properties:
        patient_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        tier: { type: string, enum: [highly_active, occasional, dormant, never_active] }
        last_activity_at: { type: [string, "null"], format: date-time }
        logs_30d: { type: integer }
        reports_30d: { type: integer }
        exercises_completed_30d: { type: integer }

    SecuritySummary:
      description: Security signals over a chosen window (failed logins, replays, new devices)
      type: object
      properties:
        failed_logins: { type: integer }
        failed_logins_by_ip:
          type: array
          items:
            type: object
            properties:
              ip: { type: string }
              count: { type: integer }
        failed_logins_by_email:
          type: array
          items:
            type: object
            properties:
              email: { type: string, format: email }
              count: { type: integer }
        refresh_token_replays: { type: integer }
        new_device_logins: { type: integer }
        hourly_failed_logins:
          type: array
          items:
            type: object
            properties:
              hour: { type: string, format: date-time }
              count: { type: integer }

    PhiAccessByActor:
      description: PHI access activity for one actor over a window
      type: object
      properties:
        actor:
          type: object
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            role: { type: string }
        summary:
          type: object
          properties:
            total_accesses: { type: integer }
            unique_resources: { type: integer }
            by_resource_type:
              type: array
              items:
                type: object
                properties:
                  resource_type: { type: string }
                  count: { type: integer }
        timeline:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              count: { type: integer }
        details:
          type: array
          items: { $ref: '#/components/schemas/AuditLog' }

    PhiAccessByResource:
      description: Every actor that touched a single resource over a window
      type: object
      properties:
        resource:
          type: object
          properties:
            type: { type: string }
            id: { type: string, format: uuid }
        accesses:
          type: array
          items: { $ref: '#/components/schemas/AuditLog' }
        unique_actors: { type: integer }

    PhiAnomalies:
      description: Behavioural anomalies in PHI access patterns
      type: object
      properties:
        bulk_listings:
          type: array
          items:
            type: object
            properties:
              actor_id: { type: string, format: uuid }
              actor_email: { type: string, format: email }
              count: { type: integer }
              window_start: { type: string, format: date-time }
        unusual_patient_views:
          type: array
          items: { type: object, additionalProperties: true }

    SystemMetrics:
      description: Process and DB pool metrics for the running API instance
      type: object
      properties:
        api:
          type: object
          properties:
            uptime_seconds: { type: number }
            memory:
              type: object
              properties:
                rss_mb: { type: number }
                heap_used_mb: { type: number }
                heap_total_mb: { type: number }
            cpu_load_1m: { type: number }
            pid: { type: integer }
            node_version: { type: string }
        db:
          type: object
          properties:
            pool_total: { type: integer }
            pool_idle: { type: integer }
            pool_waiting: { type: integer }

    NotificationPreferencesSummary:
      description: Aggregate notification-preference distribution across users
      type: object
      properties:
        by_channel:
          type: object
          additionalProperties:
            type: object
            additionalProperties: { type: integer }
        bounce_rate_24h: { type: number, description: "Percent (0–100)" }

    AdminGlobalSearchResult:
      description: Cross-entity search result (one or more of users / reports / audit_logs)
      type: object
      properties:
        users:
          type: array
          items: { $ref: '#/components/schemas/AdminUserListItem' }
        reports:
          type: array
          items: { $ref: '#/components/schemas/Report' }
        audit_logs:
          type: array
          items: { $ref: '#/components/schemas/AuditLog' }

    AdminLinkingSummary:
      description: Snapshot of linking system state
      type: object
      properties:
        active_links: { type: integer }
        disconnected_30d: { type: integer }
        pending_codes: { type: integer }
        expired_codes: { type: integer }
        top_providers:
          type: array
          items:
            type: object
            properties:
              provider_id: { type: string, format: uuid }
              name: { type: string }
              patient_count: { type: integer }

    # ─── Support ───────────────────────────────────────────────────────────────
    SupportTicket:
      description: Support ticket submitted by a patient or provider
      type: object
      required: [id, user_id, category, subject, body, attach_diagnostic, status, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        category:
          type: string
          description: "Ticket category (e.g. billing, technical, account, clinical)"
        subject: { type: string, maxLength: 200 }
        body: { type: string, maxLength: 5000 }
        attach_diagnostic: { type: boolean, description: "Whether to attach device/app diagnostic info" }
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ─── Provider Billing ──────────────────────────────────────────────────────
    ProviderBilling:
      description: Provider billing and plan tier information
      type: object
      properties:
        plan: { type: [string, "null"], description: "Current plan name (e.g. pilot, standard, enterprise)" }
        status: { type: [string, "null"], description: "Subscription status" }
        trial_ends_at: { type: [string, "null"], format: date-time }
        next_billing_at: { type: [string, "null"], format: date-time }

    # ─── Linking Metrics ───────────────────────────────────────────────────────
    LinkingMetrics:
      description: Aggregate linking metrics for the provider's dashboard
      type: object
      properties:
        total_linked: { type: integer, description: "Total active patient links" }
        pending_codes: { type: integer, description: "Codes generated but not yet accepted" }
        expired_codes: { type: integer, description: "Codes that expired without being used" }
        disconnected_30d: { type: integer, description: "Links disconnected in the last 30 days" }

paths:
  # ──────────────────────────── AUTH — PATIENT FLOW ─────────────────────────────
  /auth/patient/register:
    post:
      tags: [Auth]
      summary: Register a new patient account
      description: "Flow: register → verify-email → tokens (no MFA)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, first_name, last_name, phone]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: "Min 8 chars, 1 digit, 1 special char" }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string, pattern: '^\+[1-9]\d{7,14}$', description: "E.164 format (e.g. +15551234567). Required for SMS MFA." }
                timezone: { type: string }
      responses:
        '201': { description: Account created. Check email for 6-digit verification code. }
        '409': { description: Email already registered. }

  /auth/patient/login:
    post:
      tags: [Auth]
      summary: Patient login
      description: |
        Returns tokens directly if MFA is not enabled.
        If patient has opted into MFA, returns mfa_required + mfa_token instead.
        Use /auth/mfa/verify to complete login in that case.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Tokens (no MFA) or mfa_required (MFA enabled)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TokenPair'
                  - $ref: '#/components/schemas/MfaRequired'
        '401': { description: Invalid credentials }
        '403': { description: "WRONG_PORTAL (provider trying patient login), VERIFY_EMAIL, or ACCOUNT_INACTIVE" }
        '429': { description: Account locked after 5 failed attempts }

  # ──────────────────────────── AUTH — PATIENT OPTIONAL MFA ─────────────────────
  /auth/patient/mfa/init:
    post:
      tags: [Auth]
      summary: Initiate MFA setup for patient (opt-in)
      description: |
        Returns a setup_token. Use it with the existing MFA endpoints:
        1. POST /auth/mfa/setup (Bearer: setup_token) → QR code + secret
        2. POST /auth/mfa/verify-setup (Bearer: setup_token + TOTP code) → backup codes + tokens
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Setup token for MFA enrollment
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_token: { type: string, description: "Temporary token for MFA setup (10min TTL)" }
        '403': { description: Providers must use the provider MFA flow }
        '409': { description: MFA is already enabled }

  /auth/patient/mfa:
    delete:
      tags: [Auth]
      summary: Disable MFA for patient (opt-out)
      description: |
        Requires current password for verification. Clears TOTP secret,
        disables MFA flag, and deletes all backup codes. Providers cannot
        disable MFA — this endpoint returns 403 for non-patient roles.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, description: "Current account password for confirmation" }
      responses:
        '200': { description: MFA disabled successfully }
        '401': { description: Incorrect password }
        '403': { description: Providers cannot disable MFA }

  # ──────────────────────────── AUTH — PROVIDER FLOW ────────────────────────────
  /auth/provider/register:
    post:
      tags: [Auth]
      summary: Register a new provider account
      description: "Flow: register → verify-email → mfa/setup → mfa/verify-setup → tokens + backup codes"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, first_name, last_name, phone, license_number, license_type, specialty, clinic_name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: "Min 8 chars, 1 digit, 1 special char" }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string, pattern: '^\+[1-9]\d{7,14}$', description: "E.164 format (e.g. +15551234567). Required for SMS MFA." }
                timezone: { type: string }
                license_number: { type: string }
                license_type: { type: string }
                specialty: { type: string }
                clinic_name: { type: string }
                credentials: { type: array, items: { type: string }, description: "Professional titles (e.g. ['DDS', 'CCMC'])" }
      responses:
        '201': { description: Account created. Check email for 6-digit verification code. }
        '409': { description: Email already registered. }

  /auth/provider/login:
    post:
      tags: [Auth]
      summary: Provider login (always returns mfa_token, MFA is mandatory)
      description: |
        Providers must complete MFA on every login. Returns an mfa_token
        which must be passed to /auth/mfa/verify with a TOTP, SMS, or backup code.
        Returns 403 MFA_NOT_SETUP if the provider has not completed onboarding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: MFA required — use mfa_token with /auth/mfa/verify
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRequired'
        '401': { description: Invalid credentials }
        '403': { description: "WRONG_PORTAL (patient trying provider login), MFA_NOT_SETUP, VERIFY_EMAIL, or ACCOUNT_INACTIVE" }
        '429': { description: Account locked after 5 failed attempts }

  # ──────────────────────────── AUTH — MFA (PROVIDER ONLY) ──────────────────────
  /auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Begin MFA setup (provider onboarding, after verify-email)
      description: |
        Called once during provider onboarding. Requires the setup_token
        returned by /auth/verify-email in the Authorization header.
        Returns the TOTP secret and QR URI for authenticator app setup.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: TOTP secret + QR URI returned for authenticator app
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/MfaSetupInit' }
        '401': { description: Invalid or expired setup token }

  /auth/mfa/verify-setup:
    post:
      tags: [Auth]
      summary: Complete MFA setup with first TOTP code (issues tokens)
      description: |
        Verifies the provider's first TOTP code, enables MFA, generates 10 backup codes,
        and issues access_token + refresh_token so the provider is logged in immediately.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6, description: "6-digit TOTP code from authenticator app" }
      responses:
        '200':
          description: MFA enabled. Returns backup codes + tokens.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  backup_codes: { type: array, items: { type: string }, description: "10 one-time backup codes. Will not be shown again." }
                  access_token: { type: string, description: "JWT access token (15min)" }
                  refresh_token: { type: string, description: "Refresh token (7 days)" }

  /auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Verify MFA code to complete provider login
      description: "Accepts TOTP code, SMS code, or one-time backup code."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token: { type: string, description: "From /auth/provider/login response" }
                code: { type: string, minLength: 6, maxLength: 10, description: "6-digit TOTP/SMS or 10-char backup code" }
                type: { type: string, enum: [totp, sms, backup], default: totp }
      responses:
        '200':
          description: MFA verified — tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'

  /auth/mfa/sms:
    post:
      tags: [Auth]
      summary: Request SMS fallback MFA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token]
              properties:
                mfa_token: { type: string }
      responses:
        '200': { description: SMS code sent }

  # ──────────────────────────── AUTH — SHARED ENDPOINTS ──────────────────────────
  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email with 6-digit code (both roles)
      description: |
        Shared by both patient and provider registration flows.
        - Patient: returns access_token + refresh_token (logged in immediately).
        - Provider: returns mfa_setup_required + setup_token (must complete MFA setup).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, minLength: 6, maxLength: 6, description: "6-digit code from verification email" }
      responses:
        '200':
          description: Patient gets tokens; provider gets setup_token for MFA onboarding
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TokenPair'
                  - $ref: '#/components/schemas/MfaSetupRequired'
        '400': { description: Invalid or expired code }
        '429': { description: Too many incorrect attempts — code invalidated }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401': { description: Invalid or expired refresh token }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset code (OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Always 200 (never reveals if email exists). Sends a 6-digit OTP if account exists. }

  /auth/reset-password/verify:
    post:
      tags: [Auth]
      summary: Verify password reset OTP and receive short-lived reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, pattern: "^\\d{6}$" }
      responses:
        '200':
          description: OTP accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      reset_token: { type: string }
        '400': { description: Invalid or expired code }
        '429': { description: Too many incorrect attempts }

  /auth/reset-password/confirm:
    post:
      tags: [Auth]
      summary: Complete password reset using short-lived reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reset_token, new_password]
              properties:
                reset_token: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200': { description: Password reset. All sessions invalidated. }
        '400': { description: Invalid or expired reset token }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password (legacy endpoint)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200': { description: Password reset. All sessions invalidated. }

  /auth/resend-verify-email:
    post:
      tags: [Auth]
      summary: Resend email verification code (rate limited)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Always 200. Rate limited to 1 per 2 minutes. }

  /auth/logout:
    delete:
      tags: [Auth]
      summary: Logout (delete current refresh token)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "The refresh token to invalidate. Omit to invalidate the token matching the Authorization header's session." }
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Logged out successfully." }

  /auth/logout-all:
    delete:
      tags: [Auth]
      summary: Logout from all devices
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: All sessions and tokens deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "All sessions terminated." }

  /auth/change-password:
    patch:
      tags: [Auth]
      summary: Change password (requires current password)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Password changed successfully." }
        '400': { description: Validation error }
        '401': { description: Current password incorrect }

  /auth/fcm-token:
    patch:
      tags: [Auth]
      summary: Update Firebase Cloud Messaging token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
