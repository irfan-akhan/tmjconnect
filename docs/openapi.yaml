        - name: type
          in: query
          required: false
          description: Filter by reminder type
          schema: { type: string, enum: [exercise, symptom] }
        - name: enabled
          in: query
          required: false
          description: Filter by enabled status
          schema: { type: string, enum: ['true', 'false'] }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Reminder' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
    post:
      tags: [Reminders]
      summary: Create a reminder
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, time, days]
              properties:
                type: { type: string, enum: [exercise, symptom] }
                time: { type: string, pattern: "^\\d{2}:\\d{2}$", example: "09:00" }
                days: { type: array, items: { type: string, enum: [mon, tue, wed, thu, fri, sat, sun] } }
                enabled: { type: boolean, default: true }
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Reminder' }

  /reminders/{id}:
    patch:
      tags: [Reminders]
      summary: Update a reminder
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [exercise, symptom] }
                time: { type: string, pattern: "^\\d{2}:\\d{2}$", example: "09:00" }
                days: { type: array, items: { type: string, enum: [mon, tue, wed, thu, fri, sat, sun] } }
                enabled: { type: boolean }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Reminder' }
        '404': { description: Not found }
    delete:
      tags: [Reminders]
      summary: Delete a reminder
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Reminder deleted }

