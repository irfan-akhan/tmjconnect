          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Exercise' }
        '404': { description: Not found }
    delete:
      tags: [Providers]
      summary: Delete an exercise
      security: [{ bearerAuth: [] }]
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Exercise deleted (cascades to assignments) }

  # ──────────────────────────── REPORTS ────────────────────────────
  /reports:
    post:
      tags: [Reports]
      summary: Submit a health report to provider (patient)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          schema: { type: string, maxLength: 64 }
          description: Optional. Prevents duplicate submissions on retry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_id, urgency, description]
              properties:
                provider_id: { type: string, format: uuid }
                urgency: { type: string, enum: [routine, concerning, urgent] }
                pain_level: { type: [integer, "null"], minimum: 0, maximum: 10 }
                description: { type: string, maxLength: 10000 }
                photo_url: { type: [string, "null"], format: uri }
                period_start: { type: [string, "null"], format: date-time }
                period_end: { type: [string, "null"], format: date-time }
                patient_notes: { type: [string, "null"], maxLength: 5000 }
      responses:
        '201': { description: Report submitted. Provider notified. }
        '200': { description: Idempotent replay (report already exists). }
        '403': { description: Not linked to provider. }

  /reports/inbox:
    get:
      tags: [Reports]
      summary: Provider report inbox (sorted by urgency)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - $ref: '#/components/parameters/searchParam'
        - name: sortBy
          in: query
          schema: { type: string, enum: [created_at, urgency, status] }
        - name: status
          in: query
          schema: { type: string, enum: [submitted, viewed, reviewed, responded] }
        - name: patient_id
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: urgency
          in: query
          schema: { type: string, enum: [routine, concerning, urgent] }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReportInboxItem' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  /reports/{id}:
    get:
      tags: [Reports]
      summary: Get report detail (both roles)
      security: [{ bearerAuth: [] }]
      description: |
        Patient view: no internal_notes in responses.
        Provider view: includes internal_notes, auto-marks report as viewed.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      report: { $ref: '#/components/schemas/Report' }
                      responses:
                        type: array
                        items: { $ref: '#/components/schemas/ReportResponse' }

  /reports/{id}/respond:
    post:
      tags: [Reports]
      summary: Provider responds to a report
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, maxLength: 5000 }
                internal_notes:
                  type: [string, "null"]
                  maxLength: 5000
                  description: Provider-only notes. Never visible to patients.
      responses:
        '201':
          description: Response created. Patient notified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ReportResponse' }
        '400': { description: Validation error }
        '403': { description: Not a provider or not linked to this patient }
        '404': { description: Report not found }

  /reports/{id}/review:
    patch:
      tags: [Reports]
      summary: Mark report as reviewed (provider)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Report marked as reviewed. Patient notified. }

  /reports/{id}/flag:
    patch:
      tags: [Reports]
      summary: Toggle report flag (provider)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Flag toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [flagged]
                    properties:
                      flagged: { type: boolean, description: "New flag state after toggle" }
        '403': { description: Not a provider }
        '404': { description: Report not found }

  /reports/requests:
    get:
      tags: [Reports]
      summary: List report requests (role-aware)
      description: Patients see their own pending requests. Providers see their sent requests, with optional filters.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: status
          in: query
          schema: { type: string, enum: [pending, fulfilled, dismissed] }
        - name: patient_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReportRequest' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  /reports/requests/{id}:
    delete:
      tags: [Reports]
      summary: Dismiss a pending report request (either party)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Dismissed }
        '403': { description: Not allowed to dismiss this request }
        '409': { description: Request is not pending }

  # ─── Provider-only: clinical notes + report requests + on-behalf-of reports ───
  /providers/patients/{patientId}/notes:
    get:
      tags: [Providers]
      summary: List clinical notes for a patient (provider-scoped; never patient-visible)
      description: Returns clinical notes with offset pagination and endpoint-specific sorting.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort clinical notes by.
          schema: { type: string, enum: [created_at, updated_at], default: created_at }
          example: updated_at
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ClinicalNote' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
    post:
      tags: [Providers]
      summary: Create a clinical note (provider-only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 10000 }
                tags:
                  type: array
                  maxItems: 20
                  items: { type: string, maxLength: 50 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ClinicalNote' }

  /providers/notes/{noteId}:
    patch:
      tags: [Providers]
      summary: Update a clinical note
      security: [{ bearerAuth: [] }]
      parameters:
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body: { type: string, maxLength: 10000 }
                tags:
                  type: array
                  items: { type: string, maxLength: 50 }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ClinicalNote' }
    delete:
      tags: [Providers]
      summary: Delete a clinical note
      security: [{ bearerAuth: [] }]
      parameters:
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /providers/patients/{patientId}/report-requests:
    get:
      tags: [Providers]
      summary: List report requests sent to this patient (provider-scoped)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReportRequest' }
    post:
      tags: [Providers]
      summary: Request a report from a patient
      description: Persists a pending request and enqueues a `report_requested` notification.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string, maxLength: 2000 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ReportRequest' }

  /providers/dashboard/summary:
    get:
      tags: [Providers]
      summary: Dashboard aggregate (single round-trip replacing 4 list calls)
      description: Returns counts + recent patients + urgent inbox. Frontend dashboard hits this instead of fanning out.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      activePatients: { type: integer }
                      unreadReports: { type: integer }
                      pendingCodes: { type: integer }
                      urgentReports: { type: integer }
                      recentPatients:
                        type: array
                        items:
                          type: object
                          properties:
                            patient_id: { type: string, format: uuid }
                            first_name: { type: string }
                            last_name: { type: string }
                            last_symptom_at: { type: [string, "null"], format: date-time }
                      urgentInbox:
                        type: array
                        items: { $ref: '#/components/schemas/ReportInboxItem' }

  /providers/patients/{patientId}/reports:
    get:
      tags: [Providers]
      summary: List a linked patient's reports (provider-scoped)
      description: Returns the linked patient's reports with offset pagination, filters, and sortable fields.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort reports by.
          schema: { type: string, enum: [created_at, urgency], default: created_at }
          example: urgency
        - name: status
          in: query
          schema: { type: string, enum: [submitted, viewed, reviewed, responded] }
        - name: urgency
          in: query
          schema: { type: string, enum: [routine, concerning, urgent] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Patient's reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReportInboxItem' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
        '403': { description: Provider is not linked to this patient }
    post:
      tags: [Providers]
      summary: File a report on behalf of a patient
      description: >
        Creates a report with `authored_by_role='provider'`. Use when the patient
        can't file directly (phone call, in-person visit, escalation).
        Pass `fulfilling_request_id` to close out a pending report_request atomically.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urgency, description]
              properties:
                urgency: { type: string, enum: [routine, concerning, urgent] }
                pain_level:
                  type: integer
                  minimum: 0
                  maximum: 10
                  nullable: true
                description: { type: string, maxLength: 10000 }
                photo_url: { type: string, format: uri, nullable: true }
                period_start: { type: string, format: date-time, nullable: true }
                period_end: { type: string, format: date-time, nullable: true }
                patient_notes: { type: string, maxLength: 5000, nullable: true }
                fulfilling_request_id: { type: string, format: uuid }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Report' }

  # ──────────────────────────── LINKING ────────────────────────────
  /linking/links:
    get:
      tags: [Linking]
      summary: List active links (both roles)
      description: Returns active links for the caller with offset pagination and sorting.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort links by.
          schema: { type: string, enum: [linked_at, first_name, last_name, email], default: linked_at }
          example: last_name
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Link' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  /linking/links/{linkId}:
    delete:
      tags: [Linking]
      summary: Disconnect a link (either party)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: linkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Link disconnected }

  /linking/codes:
    post:
      tags: [Linking]
      summary: Generate a linking code (provider)
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LinkingCode' }
    get:
      tags: [Linking]
      summary: List generated codes (provider)
      description: Returns provider linking codes with offset pagination and sorting.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort linking codes by.
          schema: { type: string, enum: [created_at, expires_at, status], default: created_at }
          example: expires_at
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/LinkingCode' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  /linking/codes/{code}/invite:
    post:
      tags: [Linking]
      summary: Send email invite with linking code (provider)
      description: "The path param is the 6-character alphanumeric code value (not a UUID)."
      security: [{ bearerAuth: [] }]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, minLength: 6, maxLength: 6, description: "6-char alphanumeric linking code" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_email]
              properties:
                patient_email: { type: string, format: email }
                patient_name: { type: string, maxLength: 200 }
      responses:
        '202': { description: Invitation email queued }

  /linking/accept:
    post:
      tags: [Linking]
      summary: Accept a linking code (patient)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '201': { description: Link created. Both parties notified. }
        '404': { description: Invalid or expired code }
        '409': { description: Already linked to this provider }
        '410': { description: Code expired }

  # ──────────────────────────── UPLOADS ────────────────────────────
  /uploads/video:
    post:
      tags: [Uploads]
      summary: Upload exercise video (provider only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Max 100MB. Allowed: video/mp4, video/quicktime. Magic bytes validated."
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UploadResult' }

  /uploads/avatar:
    post:
      tags: [Uploads]
      summary: Upload avatar image (any authenticated user)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Max 5MB. Allowed: image/jpeg, image/png. Magic bytes validated."
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UploadResult' }

  /uploads/report-photo:
    post:
      tags: [Uploads]
      summary: Upload report photo (patient)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Max 10MB. Allowed: image/jpeg, image/png. Magic bytes validated."
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UploadResult' }

  # ──────────────────────── SYMPTOMS — ADDITIONAL ENDPOINTS ─────────────────
  /symptoms/stats:
    get:
      tags: [Symptoms]
      summary: Get lifetime symptom statistics
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SymptomStats' }

  /symptoms/insights:
    get:
      tags: [Insights]
      summary: Get pain trend analytics
      description: "Returns daily averages, day-of-week patterns, top triggers, pain types, and overall trend for the specified period."
      security: [{ bearerAuth: [] }]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30, minimum: 7, maximum: 365 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PainInsights' }

  /symptoms/correlation:
    get:
      tags: [Insights]
      summary: Get exercise vs pain correlation
      description: "Compares average pain on days with exercise completions vs rest days."
      security: [{ bearerAuth: [] }]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ExerciseCorrelation' }

  # ──────────────────────── PATIENT — DASHBOARD + ACTIVITY ──────────────────
  /patients/dashboard:
    get:
      tags: [Patients]
      summary: Consolidated dashboard data
      description: "Single call replacing 6 separate requests. Returns profile, today's log, streak, active assignments, recent notifications, and unread count."
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/DashboardData' }

  /patients/me/activity:
    get:
      tags: [Patients]
      summary: Get account activity log
      description: Returns account activity with offset pagination and sorting.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort activity events by.
          schema: { type: string, enum: [created_at, action], default: created_at }
          example: action
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ActivityEvent' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  # ──────────────────────── TRACKING — JAW MOBILITY ─────────────────────────
  /tracking/mobility:
    post:
      tags: [Tracking]
      summary: Log jaw mobility measurement
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [measurement_mm]
              properties:
                measurement_mm: { type: integer, minimum: 1, maximum: 80 }
                method: { type: string, enum: [fingers, ruler, caliper], default: fingers }
                notes: { type: [string, "null"], maxLength: 1000 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/MobilityLog' }
    get:
      tags: [Tracking]
      summary: List mobility logs (cursor paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema: { type: string, format: date-time, description: "logged_at of the last item from the previous page" }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MobilityLog' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

  /tracking/mobility/trend:
    get:
      tags: [Tracking]
      summary: Get jaw mobility trend (daily averages)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 60 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
