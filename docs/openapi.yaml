      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '403': { description: Can only delete your own symptom logs }
        '404': { description: Log not found }

  # ──────────────────────────── EXERCISES ────────────────────────────
  /exercises/assignments:
    get:
      tags: [Exercises]
      summary: List exercise assignments with filtering and pagination (patient)
      description: |
        Retrieve patient's exercise assignments with optional status filtering and offset-based pagination.

        **Status Filter Options:**
        - `active` - Only active assignments
        - `completed` - Only completed assignments
        - `paused` - Only paused assignments
        - Omit `status` - Return all assignments regardless of status
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: status
          in: query
          required: false
          description: Filter by assignment status
          schema: { type: string, enum: [active, completed, paused] }
        - name: sortBy
          in: query
          required: false
          description: Field to sort by
          schema: { type: string, enum: [assigned_at] }
      responses:
        '200':
          description: Success - returns filtered and paginated assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ExerciseAssignment' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
        '401': { description: Unauthorized }

  /exercises/assignments/{assignmentId}/complete:
    post:
      tags: [Exercises]
      summary: Mark an exercise assignment as completed for today
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Completion recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ExerciseCompletion' }
                  alreadyCompleted: { type: boolean, enum: [false] }
        '200':
          description: Already completed today (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ExerciseCompletion' }
                  alreadyCompleted: { type: boolean, enum: [true] }
        '403': { description: Assignment does not belong to this patient }
        '404': { description: Assignment not found }

