  # ──────────────────────────── AUTH (additions) ────────────────────────────────
  /auth/admin/login:
    post:
      tags: [Auth]
      summary: Admin login (always MFA-required)
      description: Step 1 of admin login. Always returns mfa_required + mfa_token; admins must complete /auth/mfa/verify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: MFA token for the second step
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MfaRequired' }
        '401': { description: Invalid credentials }
        '403': { description: "WRONG_PORTAL or ACCOUNT_INACTIVE" }
        '429': { description: Account locked after 5 failed attempts }

  /auth/change-email/request:
    post:
      tags: [Auth]
      summary: Request to change the account email address
      description: |
        Step 1 of the two-step email change flow. Verifies the current password,
        then emails a 6-digit verification code to the proposed new address.
        Email is only updated after /auth/change-email/verify is called with
        that code.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email, current_password]
              properties:
                new_email: { type: string, format: email, description: "Lower-cased server-side" }
                current_password: { type: string }
      responses:
        '200':
          description: Verification code emailed to new address
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/EmailChangeRequestResult' }
        '401': { description: Wrong current password }
        '409': { description: New email already in use }

  /auth/change-email/verify:
    post:
      tags: [Auth]
      summary: Verify the new email address (step 2 of email change)
      description: |
        Submit the 6-digit code sent to the new address. On success the user's
        email is updated and active sessions are NOT invalidated.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200':
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties: { ok: { type: boolean, enum: [true] } }
        '400': { description: INVALID_CODE — wrong, expired, or replayed }

  /auth/tos/current:
    get:
      tags: [Auth]
      summary: Current Terms of Service version + acceptance state
      description: Returns the published ToS version and whether the current user has accepted it.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TosCurrent' }

  /auth/tos/accept:
    post:
      tags: [Auth]
      summary: Record acceptance of a ToS version
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: string, minLength: 1, maxLength: 10, description: "Must match TosCurrent.current_version" }
      responses:
        '200':
          description: Acceptance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Accepted." }
        '400': { description: Version does not match the published current version }

