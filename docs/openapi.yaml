      security: [{ bearerAuth: [] }]
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer, minimum: 2020, maximum: 2100 }
        - name: month
          in: query
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CalendarDay' }
              examples:
                sample:
                  summary: Calendar entries with full log details
                  value:
                    data:
                      - day: '2026-06-03'
                        count: 1
                        id: 'd9c6ed9a-de65-48a8-93a5-a4d025db5958'
                        patient_id: '9cfd4fe8-2a18-4f89-98f2-28a62a2ab3f0'
                        pain_level: 6
                        pain_types: ['aching', 'throbbing']
                        body_areas:
                          - area: jaw
                            side: left
                        duration_minutes: 45
                        triggers: ['stress']
                        notes: 'Felt worse after long call.'
                        logged_at: '2026-06-03T14:56:32.435Z'
                        created_at: '2026-06-03T14:56:35.000Z'
                        updated_at: '2026-06-03T14:56:35.000Z'

  /symptoms/{id}:
    get:
      tags: [Symptoms]
      summary: Get a single symptom log
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SymptomLog' }
              examples:
                sample:
                  summary: Symptom log details by id
                  value:
                    data:
                      id: 'd9c6ed9a-de65-48a8-93a5-a4d025db5958'
                      patient_id: '9cfd4fe8-2a18-4f89-98f2-28a62a2ab3f0'
                      pain_level: 6
                      pain_types: ['aching', 'throbbing']
                      body_areas:
                        - area: jaw
                          side: left
                      duration_minutes: 45
                      triggers: ['stress']
                      notes: 'Felt worse after long call.'
                      logged_at: '2026-06-03T14:56:32.435Z'
                      created_at: '2026-06-03T14:56:35.000Z'
                      updated_at: '2026-06-03T14:56:35.000Z'
    patch:
      tags: [Symptoms]
      summary: Update a symptom log (within 24h edit window)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pain_level: { type: integer, minimum: 0, maximum: 10 }
                pain_types: { type: array, items: { type: string } }
                body_areas:
                  type: array
                  items:
                    $ref: '#/components/schemas/BodyArea'
                duration_minutes: { type: [integer, "null"] }
                triggers: { type: array, items: { type: string } }
                notes: { type: [string, "null"] }
                logged_at: { type: string, format: date-time }
      responses:
        '200':
          description: Log updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SymptomLog' }
