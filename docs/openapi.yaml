      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort activity events by.
          schema: { type: string, enum: [created_at, action], default: created_at }
          example: action
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ActivityEvent' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  # ──────────────────────── PROVIDERS — BILLING ─────────────────────────────────
  /providers/me/billing:
    get:
      tags: [Providers]
      summary: Get provider billing and plan tier
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Billing info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProviderBilling' }

  # ──────────────────────── PROVIDERS — LINK METADATA ───────────────────────────
  /providers/patients/{patientId}/link:
    patch:
      tags: [Providers]
      summary: Update per-link metadata (working diagnosis)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                diagnosis: { type: [string, "null"], description: "Provider's working diagnosis for this patient" }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Link' }
        '403': { description: Provider is not linked to this patient }
        '404': { description: Link not found }

  # ──────────────────────── LINKING — METRICS ───────────────────────────────────
  /linking/metrics:
    get:
      tags: [Linking]
      summary: Aggregate linking metrics for the provider dashboard (provider)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Linking metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LinkingMetrics' }
        '403': { description: Providers only }

  # ──────────────────────── SUPPORT ─────────────────────────────────────────────
  /support/tickets:
    post:
      tags: [Support]
      summary: Submit a support ticket (all authenticated users)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, subject, body]
              properties:
                category:
                  type: string
                  description: "Ticket category (e.g. billing, technical, account, clinical)"
                subject: { type: string, maxLength: 200 }
                body: { type: string, maxLength: 5000 }
                attach_diagnostic:
                  type: boolean
                  default: false
                  description: "Attach device/app diagnostic info to the ticket"
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SupportTicket' }
        '400': { description: Validation error }
    get:
      tags: [Support]
      summary: List the calling user's own support tickets
      description: Returns support tickets for the caller with offset pagination, status filtering, and sorting.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortOrderParam'
        - name: sortBy
          in: query
          description: Field to sort support tickets by.
          schema: { type: string, enum: [created_at, category, status], default: created_at }
          example: status
        - name: status
          in: query
          description: Filter by ticket status
          schema: { type: string, enum: [open, in_progress, resolved, closed] }
      responses:
        '200':
          description: Support tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SupportTicket' }
                  meta: { $ref: '#/components/schemas/ListMeta' }

  # ──────────────────────── HEALTH CHECK ────────────────────────────────────────
  /health:
    get:
      tags: [Auth]
      summary: API health check (unauthenticated)
      description: Returns database connectivity status. Used by load balancers and uptime monitors.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status: { type: string, enum: [healthy, degraded] }
                  timestamp: { type: string, format: date-time }
                  checks:
                    type: object
                    properties:
                      db: { type: string, enum: [ok, error] }
        '503':
          description: Unhealthy (DB unreachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [unhealthy] }
                  timestamp: { type: string, format: date-time }
                  checks:
                    type: object
                    additionalProperties: { type: string }

  /admin/feature-flags/{key}:
    patch:
      tags: [Admin]
      summary: Update a feature flag (toggle, change rollout, etc.)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                description: { type: string }
                rollout_percent: { type: integer, minimum: 0, maximum: 100 }
                target_roles:
                  type: array
                  items: { type: string, enum: [patient, provider, admin] }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/FeatureFlag' }
        '404': { description: Not found }
    delete:
      tags: [Admin]
      summary: Delete a feature flag
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }
        '404': { description: Not found }
