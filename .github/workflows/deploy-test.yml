name: Deploy to test VPS

# Push to main → test VPS. CI must already be green; this workflow does not
# re-run tests (the `ci.yml` workflow gates the merge).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + rebuild + restart (test)
    runs-on: ubuntu-latest
    environment: test     # configure required reviewers / secrets in repo settings
    timeout-minutes: 15

    steps:
      - name: Checkout (for sha tagging)
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.TEST_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.TEST_SSH_USER }}
          SSH_HOST: ${{ secrets.TEST_SSH_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            set -euo pipefail
            cd /opt/tmjconnect-test
            sudo -u tmjconnect-test git fetch origin main
            sudo -u tmjconnect-test git reset --hard origin/main
            sudo -u tmjconnect-test npm ci
            sudo -u tmjconnect-test npm run build --workspace=packages/shared
            sudo -u tmjconnect-test npm run build --workspace=apps/api
            sudo -u tmjconnect-test npm run build --workspace=apps/provider
            sudo -u tmjconnect-test npm run build --workspace=apps/admin
            sudo -u tmjconnect-test bash -c 'set -a; source /etc/tmjconnect/api-test.env; set +a; \
              npm run db:migrate --workspace=apps/api'
            sudo systemctl restart tmjconnect-api-test
          REMOTE

      - name: Health check
        env:
          HEALTH_URL: https://api.test.tmjconnect.com/health
        run: |
          # Allow up to 60s for the new process to come up.
          for i in {1..12}; do
            if curl -fsS "$HEALTH_URL" | tee /tmp/health.json | grep -q '"status":"healthy"'; then
              echo "Test deploy healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s. Last response:"
          cat /tmp/health.json || true
          exit 1
