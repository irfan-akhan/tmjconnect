# /etc/nginx/sites-available/tmjconnect-test
# Symlink: ln -s ../sites-available/tmjconnect-test /etc/nginx/sites-enabled/
#
# Test vhosts (shared host with prod):
#   api.test.tmjconnect.com       → 127.0.0.1:3001  (tmjconnect-api-test.service)
#   provider.test.tmjconnect.com  → static SPA from /opt/tmjconnect-test/apps/provider/dist
#   admin.test.tmjconnect.com     → static SPA from /opt/tmjconnect-test/apps/admin/dist
#
# Differs from prod only by:
#   - Subdomain (test.) and upstream port (3001)
#   - Application root (/opt/tmjconnect-test/...)
#   - Stricter rate limit (lower volume expected, easier to spot abuse)

limit_req_zone $binary_remote_addr zone=tmjconnect_test_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.test.tmjconnect.com provider.test.tmjconnect.com admin.test.tmjconnect.com;
    return 301 https://$host$request_uri;
}

# ─── API ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.test.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    client_max_body_size 110M;

    limit_req zone=tmjconnect_test_api burst=20 nodelay;

    location /uploads/ {
        alias /var/lib/tmjconnect-test/uploads/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}

# ─── Provider portal (test) ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name provider.test.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.test.tmjconnect.com; connect-src 'self' https://api.test.tmjconnect.com; frame-ancestors 'none'" always;

    root /opt/tmjconnect-test/apps/provider/dist;
    index index.html;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Admin dashboard (test) ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.test.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.test.tmjconnect.com; connect-src 'self' https://api.test.tmjconnect.com; frame-ancestors 'none'" always;

    root /opt/tmjconnect-test/apps/admin/dist;
    index index.html;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
