# /etc/nginx/sites-available/tmjconnect-prod
# Symlink: ln -s ../sites-available/tmjconnect-prod /etc/nginx/sites-enabled/
#
# Production vhosts:
#   api.tmjconnect.com       → 127.0.0.1:3000  (tmjconnect-api-prod.service)
#   provider.tmjconnect.com  → static SPA from /opt/tmjconnect-prod/apps/provider/dist
#   admin.tmjconnect.com     → static SPA from /opt/tmjconnect-prod/apps/admin/dist
#
# Run `certbot --nginx -d api.tmjconnect.com -d provider.tmjconnect.com -d admin.tmjconnect.com`
# AFTER this file is in place — certbot will inject ssl_certificate paths.

# ─── Edge rate limit zones (one shared definition for the whole vhost set) ───
limit_req_zone $binary_remote_addr zone=tmjconnect_prod_api:10m rate=20r/s;

# ─── Redirect plain HTTP to HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.tmjconnect.com provider.tmjconnect.com admin.tmjconnect.com;
    return 301 https://$host$request_uri;
}

# ─── API ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    # Tight CSP — API responses are JSON; no inline scripts or remote fetches needed.
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    client_max_body_size 110M;   # video uploads cap at 100MB; headroom for multipart overhead

    # Edge rate limit — defense in depth alongside express-rate-limit.
    limit_req zone=tmjconnect_prod_api burst=40 nodelay;

    # Uploads (read-only — only the API process writes to this dir).
    location /uploads/ {
        alias /var/lib/tmjconnect-prod/uploads/;
        access_log off;
        expires 7d;
    }

    # API proxy.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}

# ─── Provider portal ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name provider.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.tmjconnect.com; connect-src 'self' https://api.tmjconnect.com; frame-ancestors 'none'" always;

    root /opt/tmjconnect-prod/apps/provider/dist;
    index index.html;

    # Hashed asset bundles — long cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history-fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Admin dashboard ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.tmjconnect.com;

    include snippets/tmjconnect-common-tls.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.tmjconnect.com; connect-src 'self' https://api.tmjconnect.com; frame-ancestors 'none'" always;

    root /opt/tmjconnect-prod/apps/admin/dist;
    index index.html;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
