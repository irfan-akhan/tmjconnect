worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ─── Logging ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ─── Rate limiting at proxy level (belt-and-suspenders) ──────────────────────
    # Express-rate-limit is the primary mechanism. Nginx rate limit is a secondary guard.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # ─── Shared TLS settings (applied to every HTTPS server block) ──────────────
    # Kept here to avoid repeating ssl_* + security headers in each server block.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.tmjconnect.com;

        # Let's Encrypt ACME challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS API server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.tmjconnect.com;

        # SSL certificates (managed by Certbot / Let's Encrypt).
        ssl_certificate     /etc/letsencrypt/live/api.tmjconnect.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.tmjconnect.com/privkey.pem;

        # TLS settings now live at the http{} level (shared across all HTTPS blocks).

        # ─── Security headers (supplementing Helmet in Express) ─────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── API proxy ───────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";

            # Allow large file uploads (slightly above max upload size: 100MB video).
            client_max_body_size 110M;

            # Timeouts.
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ─── Health check (direct, no rate limit) ────────────────────────────────
        location /health {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            access_log off;
        }

        # ─── Serve uploaded files (pilot: local disk via Nginx) ──────────────────
        # Production: files are served from S3 + CloudFront. This block is pilot-only.
        location /uploads/ {
            alias /data/uploads/;
            # Cache uploaded files (avatars, videos, report photos).
            add_header Cache-Control "public, max-age=86400";
            # Prevent script execution in uploads directory.
            add_header Content-Disposition "attachment";
            # Only serve known media types — reject unknown MIME types.
            types {
                video/mp4                  mp4;
                video/quicktime            mov;
                image/jpeg                 jpg jpeg;
                image/png                  png;
            }
            default_type application/octet-stream;
        }

        # ─── Block dotfiles ───────────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ─── HTTP → HTTPS redirect (provider + admin portals) ──────────────────────
    server {
        listen 80;
        server_name provider.tmjconnect.com admin.tmjconnect.com;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ─── Provider portal (SPA) ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name provider.tmjconnect.com;

        ssl_certificate     /etc/letsencrypt/live/provider.tmjconnect.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/provider.tmjconnect.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: allow self + the API origin for XHR, Google Fonts for Fraunces/IBM Plex.
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.tmjconnect.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        root /usr/share/nginx/html/provider;
        index index.html;

        # Hash-named assets — cache hard.
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Proxy API calls to the api service (keeps the SPA on a single origin,
        # sidesteps CORS for the browser's own requests).
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 110M;
            proxy_read_timeout 60s;
        }

        # SPA fallback — hand every non-asset path to index.html so React Router owns routing.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location ~ /\. { deny all; access_log off; log_not_found off; }
    }

    # ─── Admin portal (SPA) ─────────────────────────────────────────────────────
    # Mirrors the provider block. Served only when admin app is rebuilt + deployed.
    server {
        listen 443 ssl;
        server_name admin.tmjconnect.com;

        ssl_certificate     /etc/letsencrypt/live/admin.tmjconnect.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.tmjconnect.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.tmjconnect.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        root /usr/share/nginx/html/admin;
        index index.html;

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 110M;
            proxy_read_timeout 60s;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location ~ /\. { deny all; access_log off; log_not_found off; }
    }
}
