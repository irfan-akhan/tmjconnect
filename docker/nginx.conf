worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ─── Logging ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ─── Rate limiting at proxy level (belt-and-suspenders) ──────────────────────
    # Express-rate-limit is the primary mechanism. Nginx rate limit is a secondary guard.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.tmjconnect.com;

        # Let's Encrypt ACME challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS API server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.tmjconnect.com;

        # SSL certificates (managed by Certbot / Let's Encrypt).
        ssl_certificate     /etc/letsencrypt/live/api.tmjconnect.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.tmjconnect.com/privkey.pem;

        # TLS 1.2+ only per HIPAA transmission security requirement.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ─── Security headers (supplementing Helmet in Express) ─────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── API proxy ───────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";

            # Allow large file uploads (slightly above max upload size: 100MB video).
            client_max_body_size 110M;

            # Timeouts.
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ─── Health check (direct, no rate limit) ────────────────────────────────
        location /health {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            access_log off;
        }

        # ─── Serve uploaded files (pilot: local disk via Nginx) ──────────────────
        # Production: files are served from S3 + CloudFront. This block is pilot-only.
        location /uploads/ {
            alias /data/uploads/;
            # Cache uploaded files (avatars, videos, report photos).
            add_header Cache-Control "public, max-age=86400";
            # Prevent script execution in uploads directory.
            add_header Content-Disposition "attachment";
            # Only serve known media types — reject unknown MIME types.
            types {
                video/mp4                  mp4;
                video/quicktime            mov;
                image/jpeg                 jpg jpeg;
                image/png                  png;
            }
            default_type application/octet-stream;
        }

        # ─── Block dotfiles ───────────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
