# TMJConnect — Development stack (everything in containers with HMR).
#
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up            # foreground, see logs
#   docker compose -f docker/docker-compose.dev.yml up -d         # detached
#   docker compose -f docker/docker-compose.dev.yml logs -f api   # follow one
#   docker compose -f docker/docker-compose.dev.yml down          # stop
#
# How it works:
# - The monorepo is bind-mounted at /app in each app container so edits on the
#   host are visible instantly. A named volume (<service>_node_modules) is
#   mounted at /app/node_modules so host macOS native modules don't clobber
#   Linux ones in the container.
# - CHOKIDAR_USEPOLLING=true — Vite/ts-node-dev file watchers don't receive
#   fsevents from the host bind mount on Docker Desktop, so they poll.
# - Ports exposed on localhost so host tooling (curl, browser) can reach each
#   service directly. No nginx in dev — the Vite proxy handles /api passthrough.

services:

  # ─── PostgreSQL (dev) ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tmjconnect
      POSTGRES_USER: tmjconnect
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmjconnect"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── PostgreSQL (test — used by jest integration suite) ─────────────────────
  postgres_test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tmjconnect_test
      POSTGRES_USER: tmjconnect
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmjconnect"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Migrate (dev one-shot) ─────────────────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tmjconnect:dev_password@postgres:5432/tmjconnect
    working_dir: /app/apps/api
    command: ["npm", "run", "db:migrate"]
    volumes:
      - ..:/app
      - api_node_modules:/app/node_modules
      - shared_dist:/app/packages/shared/dist
    restart: "no"

  # ─── API (dev, with ts-node-dev hot reload) ─────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://tmjconnect:dev_password@postgres:5432/tmjconnect
      # Dev secrets — match the host apps/api/.env so the seeded MFA data in
      # postgres_dev_data stays decryptable. NOT for production use.
      JWT_SECRET: c275dc1602f636bf6e1315514d090eb95bf29b73d4346b5d08d36f47f466ca955
      JWT_REFRESH_SECRET: ff9f32199e0f1ab81bf1c26cdb7b21c6fcc265af1ff23447229c1924850fd0cf
      MFA_ENCRYPTION_KEY: 6078c6d64f9785ee3aa3d52ded77ac89c562c5995398bd7cb785326059359263
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://192.168.1.23:3000,http://192.168.1.23:8081
      STORAGE_DRIVER: local
      UPLOAD_DIR: /data/uploads
      APP_URL: http://localhost:5174
      API_URL: http://192.168.1.23:3000
      LOG_LEVEL: debug
      CHOKIDAR_USEPOLLING: "true"
      # Optional integrations — blank means "feature disabled".
      RESEND_API_KEY: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_PHONE_NUMBER: ""
      FIREBASE_PROJECT_ID: ""
      FIREBASE_CLIENT_EMAIL: ""
      FIREBASE_PRIVATE_KEY: ""
      SENTRY_DSN: ""
    ports:
      - "3000:3000"
    working_dir: /app/apps/api
    command: ["npm", "run", "dev"]
    volumes:
      - ..:/app
      - api_node_modules:/app/node_modules
      - shared_dist:/app/packages/shared/dist
      - uploads_dev_data:/data/uploads

  # ─── Provider portal (dev, Vite HMR) ────────────────────────────────────────
  provider:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # Inside the compose network, the API is reachable at http://api:3000 —
      # not the host's localhost. vite.config.ts reads this env var.
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5174:5174"
    working_dir: /app/apps/provider
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5174"]
    volumes:
      - ..:/app
      - provider_node_modules:/app/node_modules
      - shared_dist:/app/packages/shared/dist

  # ─── Admin portal (dev, Vite HMR) ───────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    working_dir: /app/apps/admin
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ..:/app
      - admin_node_modules:/app/node_modules
      - shared_dist:/app/packages/shared/dist

volumes:
  postgres_dev_data:
  postgres_test_data:
  uploads_dev_data:
  # Separate node_modules per service so each container has its own install
  # state. A shared volume would work too; separate is safer against
  # concurrent installs in pathological cases.
  api_node_modules:
  provider_node_modules:
  admin_node_modules:
  # Shared package dist shared by api/provider/admin — the dev image builds it
  # once at image-build time; this volume persists it across restarts so the
  # host bind-mount doesn't mask it with an empty host dist/.
  shared_dist:
